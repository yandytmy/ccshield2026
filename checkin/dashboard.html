<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CCShield 2026 內部看板</title>

<script src="https://www.gstatic.com/charts/loader.js"></script>

<style>
:root {
  --bg-color: #0e0e0e;
  --card-bg: #1e1e1e;
  --success: #0b3d0e;
  --success-border: #43a047;
  --danger: #3d0b0b;
  --danger-border: #e53935;
  --text-gold: #FFD54F;
  --primary: #1E88E5;
}

/* 初始隱藏 body，密碼正確才顯示 */
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg-color); color: #fff; margin: 0; padding: 10px;
  display: none;
}

.nav-tabs {
  display: flex; justify-content: center; gap: 8px; margin-bottom: 20px;
  position: sticky; top: 0; background: #000; padding: 10px 0; z-index: 100;
}
.tab-btn {
  background: #333; color: #fff; border: none; padding: 10px 15px;
  border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 13px;
}
.tab-btn.active { background: var(--primary); }

.view-section { display: none; }
.view-section.active { display: block; }

.team-row {
  display: flex; align-items: center; gap: 8px; background: var(--card-bg);
  padding: 10px; border-radius: 8px; margin-bottom: 10px; 
  overflow-x: auto;
}
.team-row::-webkit-scrollbar { display: none; }

.team-label { min-width: 65px; font-weight: bold; color: var(--text-gold); font-size: 18px; border-right: 1px solid #444; text-align: center; flex-shrink: 0; }
.members-container { display: flex; gap: 8px; }

.member-box {
  min-width: 80px; min-height: 55px; padding: 5px; border-radius: 6px;
  display: flex; flex-direction: column; align-items: center; font-size: 12px; border: 2px solid transparent;
  justify-content: center; flex-shrink: 0;
}
.is-none { background: var(--danger); border-color: var(--danger-border); opacity: 0.6; }
.is-done { background: var(--success); border-color: var(--success-border); }

.tag { background: rgba(255, 255, 255, 0.2); padding: 1px 4px; border-radius: 3px; font-size: 9px; margin: 1px; }
</style>
</head>

<body>

<div class="nav-tabs">
  <button class="tab-btn active" onclick="switchView('overall', this)">🏠 總覽</button>
  <button class="tab-btn" onclick="switchView('event', this)">🎯 項目</button>
  <button class="tab-btn" onclick="switchView('time', this)">🕒 40m 網格</button>
</div>

<div id="loading" style="text-align:center; margin-top:50px; color:var(--text-gold);">正在同步數據...</div>

<div id="overall-view" class="view-section active">
  <div id="overallGrid"></div>
</div>

<div id="event-view" class="view-section">
  <div style="margin-bottom:15px;">
    <select id="eventSelector" onchange="renderEventView()" style="width:100%; padding:12px; border-radius:8px; background:#333; color:white;">
      <option value="繩結">項目一：繩結</option>
      <option value="金氏遊戲">項目二：金氏遊戲</option>
      <option value="體育技能">項目三：體育技能</option>
      <option value="小隊競技">項目四：小隊競技</option>
      <option value="團隊機智">項目五：團隊機智</option>
      <option value="神秘項目">項目六：神秘項目</option>
    </select>
  </div>
  <div id="eventGrid"></div>
</div>

<div id="time-view" class="view-section">
  <div style="background:#222; padding:15px; border-radius:10px; margin-bottom:20px;">
    <select id="timeRangeSelector" onchange="toggleTimeInputs()" style="width:100%; padding:10px; border-radius:8px; background:#333; color:white;">
      <option value="40m">最近 40 分鐘</option>
      <option value="all">全場活動網格</option>
      <option value="custom">自定義時段</option>
    </select>
    <div id="customTimeInput" style="display:none; margin-top:10px; gap:5px; align-items:center;">
        <input type="time" id="startTime" onchange="renderTimeView()" style="flex:1; padding:8px;">
        <span>至</span>
        <input type="time" id="endTime" onchange="renderTimeView()" style="flex:1; padding:8px;">
    </div>
  </div>
  <div id="timeList"></div>
</div>

<script>
// --- 安全加密驗證 ---
async function checkAccess() {
  const HASHED_PW = "e804f86d649d375336e848602a6f203623f99e829373f7529402513904669818"; // "ccshield2026"

  const userEntry = prompt("🔒 請輸入管理員密碼：");
  if (!userEntry) { window.location.href = "about:blank"; return; }

  const msgUint8 = new TextEncoder().encode(userEntry);
  const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');

  if (hashHex === HASHED_PW) {
    document.body.style.display = "block";
    google.charts.load('current', {'packages':['corechart']});
    google.charts.setOnLoadCallback(init);
  } else {
    alert("密碼錯誤！");
    window.location.href = "about:blank";
  }
}

const SS_ID = "1dwK703awpcqW6A3BofDA8cjNSlER2C2Tz5wIu7wr6XQ"; 
const SHEET_NAME = "response"; 

const TEAM_CONFIG = {};
for (let i = 1; i <= 26; i++) {
  let tId = i.toString().padStart(2, '0');
  let members = "ABCDEFGHI"; 
  if ([1, 2, 7, 13, 20].includes(i)) members = "ABCDEFGH"; 
  if (i === 21) members = "ABCDEFG"; 
  TEAM_CONFIG[tId] = members.split("");
}

let rawDataRows = []; 

function init() { fetchData(); setInterval(fetchData, 30000); }

function switchView(viewName, btn) {
  document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(viewName + '-view').classList.add('active');
  btn.classList.add('active');
  window.scrollTo(0,0);
}

function toggleTimeInputs() {
  document.getElementById('customTimeInput').style.display = (document.getElementById('timeRangeSelector').value === 'custom') ? 'flex' : 'none';
  renderTimeView();
}

function fetchData() {
  const query = new google.visualization.Query(`https://docs.google.com/spreadsheets/d/${SS_ID}/gviz/tq?sheet=${SHEET_NAME}&tq=SELECT *`);
  query.send(r => {
    if (r.isError()) return;
    const d = r.getDataTable();
    rawDataRows = [];
    for (let i = 0; i < d.getNumberOfRows(); i++) {
      rawDataRows.push({ timestamp: d.getValue(i, 0), id: d.getValue(i, 2).toString().trim().toUpperCase(), event: d.getValue(i, 3) });
    }
    document.getElementById('loading').style.display = 'none';
    renderOverallView(); renderEventView(); renderTimeView();
  });
}

function renderOverallView() {
  let statusMap = buildStatusMap();
  rawDataRows.forEach(row => { if(statusMap[row.id] && !statusMap[row.id].includes(row.event)) statusMap[row.id].push(row.event); });
  document.getElementById('overallGrid').innerHTML = generateGridHtml(statusMap, true, null);
}

function renderEventView() {
  const ev = document.getElementById('eventSelector').value;
  let statusMap = buildStatusMap();
  let teamCounts = {};
  Object.keys(TEAM_CONFIG).forEach(t => teamCounts[t] = 0);
  rawDataRows.forEach(row => {
    if (row.event === ev && statusMap[row.id]) {
      statusMap[row.id].push(ev);
      teamCounts[row.id.substring(0,2)]++;
    }
  });
  document.getElementById('eventGrid').innerHTML = `<h3>🎯 項目：${ev}</h3>` + generateGridHtml(statusMap, false, teamCounts);
}

function renderTimeView() {
  const range = document.getElementById('timeRangeSelector').value;
  let filtered = [...rawDataRows];
  const now = new Date();

  if (range === '40m') {
    filtered = rawDataRows.filter(row => (now - new Date(row.timestamp)) <= 2400000); 
  } else if (range === 'custom') {
    const s = document.getElementById('startTime').value, e = document.getElementById('endTime').value;
    if (s && e) {
      const d1 = new Date(now), d2 = new Date(now);
      d1.setHours(s.split(':')[0], s.split(':')[1], 0); d2.setHours(e.split(':')[0], e.split(':')[1], 0);
      filtered = rawDataRows.filter(row => { const r = new Date(row.timestamp); return r >= d1 && r <= d2; });
    }
  }

  let timeMap = buildStatusMap();
  filtered.forEach(row => { if(timeMap[row.id]) timeMap[row.id].push(row.event); });
  document.getElementById('timeList').innerHTML = `<h3>🕒 該時段活跃網格 (${filtered.length} 筆)</h3>` + generateGridHtml(timeMap, true, null);
}

function buildStatusMap() {
  let map = {};
  Object.keys(TEAM_CONFIG).forEach(tId => { TEAM_CONFIG[tId].forEach(m => map[tId + m] = []); });
  return map;
}

function generateGridHtml(map, showTags, counts) {
  let html = "";
  const sortedTeamIds = Object.keys(TEAM_CONFIG).sort((a, b) => parseInt(a) - parseInt(b));
  sortedTeamIds.forEach(tId => {
    let cText = counts ? `<div style="font-size:10px; color:var(--text-gold);">Count: ${counts[tId]}</div>` : "";
    html += `<div class="team-row"><div class="team-label">T${tId}${cText}</div><div class="members-container">`;
    TEAM_CONFIG[tId].forEach(letter => {
      let id = tId + letter;
      let done = map[id] && map[id].length > 0;
      let tags = (showTags && map[id]) ? map[id].map(e => `<span class="tag">${e}</span>`).join('') : "";
      html += `<div class="member-box ${done ? 'is-done' : 'is-none'}"><div style="font-weight:bold;">${id}</div><div style="display:flex;flex-wrap:wrap;justify-content:center;">${tags}</div></div>`;
    });
    html += `</div></div>`;
  });
  return html;
}

// 啟動驗證
window.onload = checkAccess;
</script>
</body>
</html>
