<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CCShield 2026 多功能看板</title>

<script src="https://www.gstatic.com/charts/loader.js"></script>

<style>
:root {
  --bg-color: #0e0e0e;
  --card-bg: #1e1e1e;
  --success: #0b3d0e;
  --success-border: #43a047;
  --danger: #3d0b0b;
  --danger-border: #e53935;
  --text-gold: #FFD54F;
  --primary: #1E88E5;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg-color); color: #fff; margin: 0; padding: 10px;
}

/* 導覽選單 */
.nav-tabs {
  display: flex; justify-content: center; gap: 8px; margin-bottom: 20px;
  position: sticky; top: 0; background: #000; padding: 10px 0; z-index: 100;
}
.tab-btn {
  background: #333; color: #fff; border: none; padding: 10px 15px;
  border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 13px;
  transition: 0.2s;
}
.tab-btn.active { background: var(--primary); }

.view-section { display: none; }
.view-section.active { display: block; }

/* 共通樣式 */
.team-row {
  display: flex; align-items: center; gap: 8px; background: var(--card-bg);
  padding: 10px; border-radius: 8px; margin-bottom: 10px; 
  overflow-x: auto; -webkit-overflow-scrolling: touch;
}
/* 隱藏滾動條但保持功能 */
.team-row::-webkit-scrollbar { display: none; }

.team-label { min-width: 50px; font-weight: bold; color: var(--text-gold); font-size: 18px; border-right: 1px solid #444; }
.members-container { display: flex; gap: 8px; }

.member-box {
  min-width: 80px; min-height: 55px; padding: 5px; border-radius: 6px;
  display: flex; flex-direction: column; align-items: center; font-size: 12px; border: 2px solid transparent;
  justify-content: center;
}
.is-none { background: var(--danger); border-color: var(--danger-border); opacity: 0.6; }
.is-done { background: var(--success); border-color: var(--success-border); }

.tag { background: rgba(255, 255, 255, 0.2); padding: 1px 4px; border-radius: 3px; font-size: 9px; margin: 1px; }

/* 時間分佈專用樣式 */
.timeline-item { border-left: 3px solid var(--primary); padding: 10px 15px; margin-bottom: 10px; background: #222; border-radius: 5px; }
.time-stamp { color: var(--text-gold); font-family: monospace; }
</style>
</head>

<body>

<div class="nav-tabs" id="tabGroup">
  <button class="tab-btn active" onclick="switchView('overall', this)">🏠 總覽看板</button>
  <button class="tab-btn" onclick="switchView('event', this)">🎯 項目分佈</button>
  <button class="tab-btn" onclick="switchView('time', this)">🕒 時間動態</button>
</div>

<div id="loading" style="text-align:center; margin-top:50px; color:var(--text-gold);">正在同步數據...</div>

<div id="overall-view" class="view-section active">
  <div id="overallGrid"></div>
</div>

<div id="event-view" class="view-section">
  <div style="margin-bottom:15px;">
    <select id="eventSelector" onchange="renderEventView()" style="width:100%; padding:12px; border-radius:8px; background:#333; color:white; font-size:16px;">
      <option value="繩結">項目一：繩結</option>
      <option value="金氏遊戲">項目二：金氏遊戲</option>
      <option value="體育技能">項目三：體育技能</option>
      <option value="小隊競技">項目四：小隊競技</option>
      <option value="團隊機智">項目五：團隊機智</option>
      <option value="神秘項目">項目六：神秘項目</option>
    </select>
  </div>
  <div id="eventGrid"></div>
</div>

<div id="time-view" class="view-section">
  <div style="background:#222; padding:15px; border-radius:10px; margin-bottom:20px;">
    <label style="color:var(--text-gold); font-weight:bold;">🕒 時間範圍篩選：</label>
    <select id="timeRangeSelector" onchange="toggleTimeInputs()" style="width:100%; padding:10px; margin-top:10px; border-radius:8px; background:#333; color:white;">
      <option value="all">最新 50 筆紀錄</option>
      <option value="1h">最近 1 小時</option>
      <option value="custom">自定義時段 (From... To...)</option>
    </select>
    
    <div id="customTimeInput" style="display:none; margin-top:10px; gap:10px;">
      <div style="display:flex; gap:5px; align-items:center; width:100%;">
        <input type="time" id="startTime" onchange="renderTimeView()" style="flex:1; padding:8px; border-radius:5px;">
        <span>至</span>
        <input type="time" id="endTime" onchange="renderTimeView()" style="flex:1; padding:8px; border-radius:5px;">
      </div>
    </div>
  </div>
  <div id="timeList"></div>
</div>

<script>
const SS_ID = "1dwK703awpcqW6A3BofDA8cjNSlER2C2Tz5wIu7wr6XQ"; 
const SHEET_NAME = "response"; 

let rawDataRows = []; 

google.charts.load('current', {'packages':['corechart']});
google.charts.setOnLoadCallback(init);

function init() {
  fetchData();
  setInterval(fetchData, 30000);
}

function toggleTimeInputs() {
  const range = document.getElementById('timeRangeSelector').value;
  document.getElementById('customTimeInput').style.display = (range === 'custom') ? 'flex' : 'none';
  renderTimeView();
}

function switchView(viewName, btnElement) {
  document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  
  document.getElementById(viewName + '-view').classList.add('active');
  btnElement.classList.add('active');
  window.scrollTo(0,0);
}

function fetchData() {
  const query = new google.visualization.Query(`https://docs.google.com/spreadsheets/d/${SS_ID}/gviz/tq?sheet=${SHEET_NAME}&tq=SELECT *`);
  query.send(handleResponse);
}

function handleResponse(response) {
  if (response.isError()) {
    document.getElementById('loading').innerText = "讀取失敗：" + response.getMessage();
    return;
  }
  const data = response.getDataTable();
  const rowsCount = data.getNumberOfRows();
  document.getElementById('loading').style.display = 'none';

  rawDataRows = [];
  for (let i = 0; i < rowsCount; i++) {
    rawDataRows.push({
      timestamp: data.getValue(i, 0),
      id: data.getValue(i, 2) ? data.getValue(i, 2).toString().trim().toUpperCase() : "",
      event: data.getValue(i, 3)
    });
  }

  renderOverallView();
  renderEventView();
  renderTimeView();
}

function renderOverallView() {
  const container = document.getElementById('overallGrid');
  let statusMap = buildStatusMap(); 
  rawDataRows.forEach(row => {
    if (statusMap[row.id] && !statusMap[row.id].includes(row.event)) {
      statusMap[row.id].push(row.event);
    }
  });
  container.innerHTML = generateGridHtml(statusMap, true, null);
}

function renderEventView() {
  const selectedEvent = document.getElementById('eventSelector').value;
  const container = document.getElementById('eventGrid');
  let eventStatusMap = buildStatusMap(); 
  let teamCountMap = {}; // 用來存每一隊(T01-T26)的總人數

  // 1. 初始化每一隊的 Count 為 0
  for (let i = 1; i <= 26; i++) teamCountMap[i.toString().padStart(2, '0')] = 0;

  // 2. 填充數據
  rawDataRows.forEach(row => {
    if (row.event === selectedEvent && eventStatusMap[row.id]) {
      eventStatusMap[row.id].push(row.event);
      // 增加該隊的總計數 (從 ID 前兩位取得隊號)
      let teamId = row.id.substring(0, 2);
      if (teamCountMap[teamId] !== undefined) {
        teamCountMap[teamId]++;
      }
    }
  });

  let html = `<h3 style='color:var(--primary); margin-bottom:15px;'>🎯 項目：${selectedEvent}</h3>`;
  
  for (let t = 1; t <= 26; t++) {
    let teamId = t.toString().padStart(2, '0');
    let count = teamCountMap[teamId];
    
    html += `
      <div class="team-row">
        <div class="team-label">
          T${teamId}
          <div style="font-size:10px; color:var(--text-gold); margin-top:4px;">Count: ${count}</div>
        </div>
        <div class="members-container">`;
    
    "ABCDEFGHI".split("").forEach(letter => {
      let id = teamId + letter;
      let hasDone = eventStatusMap[id].length > 0;
      html += `
        <div class="member-box ${hasDone ? 'is-done' : 'is-none'}">
          <div style="font-weight:bold;">${id}</div>
        </div>`;
    });
    html += `</div></div>`;
  }
  container.innerHTML = html;
}

function renderTimeView() {
  const container = document.getElementById('timeList');
  const range = document.getElementById('timeRangeSelector').value;
  const now = new Date();
  let filteredData = [...rawDataRows];

  // 時間篩選邏輯
  if (range === '1h') {
    filteredData = rawDataRows.filter(row => (now - new Date(row.timestamp)) <= 3600000);
  } else if (range === 'custom') {
    const startVal = document.getElementById('startTime').value;
    const endVal = document.getElementById('endTime').value;
    if (startVal && endVal) {
      const startDate = new Date(); const [sh, sm] = startVal.split(':'); startDate.setHours(sh, sm, 0, 0);
      const endDate = new Date(); const [eh, em] = endVal.split(':'); endDate.setHours(eh, em, 0, 0);
      filteredData = rawDataRows.filter(row => {
        const d = new Date(row.timestamp); return d >= startDate && d <= endDate;
      });
    } else {
      container.innerHTML = "<p style='color:#666;'>請輸入起始與結束時間以進行網格分析。</p>";
      return;
    }
  } else {
    // 預設「最新 50 筆」在網格模式下較無意義，改為顯示所有有紀錄的
    filteredData = [...rawDataRows];
  }

  // 建立時間篩選後的狀態 Map
  let timeStatusMap = buildStatusMap();
  filteredData.forEach(row => {
    if (timeStatusMap[row.id] && !timeStatusMap[row.id].includes(row.event)) {
      timeStatusMap[row.id].push(row.event);
    }
  });

  let html = `<h3>🕒 該時段活動網格 (共 ${filteredData.length} 筆紀錄)</h3>`;
  if (filteredData.length === 0) {
    html += `<p style="color:#e53935;">⚠️ 此時段內沒有任何隊員進行簽到。</p>`;
  } else {
    // 使用與總覽相同的 generateGridHtml，但傳入 true 以顯示參與了哪些項目
    html += generateGridHtml(timeStatusMap, true, null);
  }
  container.innerHTML = html;
}

function buildStatusMap() {
  let map = {};
  for (let i = 1; i <= 26; i++) {
    let t = i.toString().padStart(2, '0');
    "ABCDEFGHI".split("").forEach(m => map[t + m] = []);
  }
  return map;
}

function generateGridHtml(map, showTags, countMap) {
  let html = "";
  for (let t = 1; t <= 26; t++) {
    let teamId = t.toString().padStart(2, '0');
    html += `<div class="team-row"><div class="team-label">T${teamId}</div><div class="members-container">`;
    "ABCDEFGHI".split("").forEach(letter => {
      let id = teamId + letter;
      let hasDone = map[id].length > 0;
      let tags = showTags ? map[id].map(e => `<span class="tag">${e}</span>`).join('') : "";
      let countText = countMap ? `<div style="color:var(--text-gold); font-size:10px; margin-top:2px;">Count: ${countMap[id] ? countMap[id].size : 0}</div>` : "";
      
      html += `
        <div class="member-box ${hasDone ? 'is-done' : 'is-none'}">
          <div style="font-weight:bold;">${id}</div>
          ${countText}
          <div style="display:flex;flex-wrap:wrap;justify-content:center;">${tags}</div>
        </div>`;
    });
    html += `</div></div>`;
  }
  return html;
}
</script>
</body>
</html>
