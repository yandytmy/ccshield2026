<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CCShield 2026 實時看板</title>

<script src="https://www.gstatic.com/charts/loader.js"></script>

<style>
:root {
  --bg-color: #0e0e0e;
  --card-bg: #1e1e1e;
  --success: #0b3d0e;
  --success-border: #43a047;
  --danger: #3d0b0b;
  --danger-border: #e53935;
  --text-gold: #FFD54F;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg-color);
  color: #fff;
  margin: 0;
  padding: 10px;
}

header {
  text-align: center;
  padding: 20px;
  background: #000;
  border-bottom: 2px solid #333;
  margin-bottom: 20px;
}

.refresh-info {
  text-align: center;
  font-size: 12px;
  color: #888;
  margin-bottom: 10px;
}

/* 每一隊一列的容器 */
.team-row {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--card-bg);
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 10px;
  overflow-x: auto; /* 手機版可橫向滑動 A-I */
  white-space: nowrap;
}

.team-label {
  min-width: 50px;
  font-weight: bold;
  color: var(--text-gold);
  font-size: 18px;
  border-right: 1px solid #444;
}

/* 隊員方格容器 */
.members-container {
  display: flex;
  gap: 8px;
}

/* 隊員方格樣式 */
.member-box {
  min-width: 85px;
  min-height: 65px;
  padding: 5px;
  border-radius: 6px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  font-size: 12px;
  border: 2px solid transparent;
  transition: all 0.3s ease;
}

/* 狀態顏色 */
.is-none {
  background: var(--danger);
  border-color: var(--danger-border);
  opacity: 0.6;
}

.is-done {
  background: var(--success);
  border-color: var(--success-border);
  opacity: 1;
}

.member-id {
  font-weight: bold;
  font-size: 14px;
  margin-bottom: 4px;
}

/* 項目標籤樣式 */
.tag-list {
  display: flex;
  flex-wrap: wrap;
  gap: 2px;
  justify-content: center;
}

.tag {
  background: rgba(255, 255, 255, 0.2);
  padding: 1px 4px;
  border-radius: 3px;
  font-size: 9px;
  color: #eee;
}

/* Loading 狀態 */
#loading {
  text-align: center;
  font-size: 20px;
  margin-top: 50px;
  color: var(--text-gold);
}
</style>
</head>

<body>

<header>
  <div style="font-size: 24px;">📊 CCShield 2026 實時看板</div>
</header>

<div class="refresh-info" id="refreshInfo">數據同步中...</div>

<div id="loading">正在連線至 Google Sheets...</div>
<div id="dashboardGrid"></div>

<script>
// --- 配置區 ---
const SS_ID = "1dwK703awpcqW6A3BofDA8cjNSlER2C2Tz5wIu7wr6XQ"; 
const SHEET_NAME = "response"; // 你的分頁名稱

// 初始化 Google Loader
google.charts.load('current', {'packages':['corechart']});
google.charts.setOnLoadCallback(init);

function init() {
  fetchData();
  // 每 30 秒自動刷新數據
  setInterval(fetchData, 30000);
}

function fetchData() {
  document.getElementById('refreshInfo').innerText = "數據更新時間: " + new Date().toLocaleTimeString();
  
  // SELECT * 代表抓取所有欄位，我們後續手動指定 Index
  const query = new google.visualization.Query(
    `https://docs.google.com/spreadsheets/d/${SS_ID}/gviz/tq?sheet=${SHEET_NAME}&tq=SELECT *`
  );
  
  // 停用快取
  query.setRefreshInterval(0); 
  query.send(handleResponse);
}

function handleResponse(response) {
  if (response.isError()) {
    document.getElementById('loading').innerText = "讀取失敗：" + response.getMessage();
    return;
  }

  const data = response.getDataTable();
  const rows = data.getNumberOfRows();
  document.getElementById('loading').style.display = 'none';

  // 1. 初始化狀態 Map (01A 到 26I)
  let statusMap = {};
  for (let i = 1; i <= 26; i++) {
    let teamNum = i.toString().padStart(2, '0');
    "ABCDEFGHI".split("").forEach(m => {
      statusMap[teamNum + m] = [];
    });
  }

  // 2. 填入數據 (根據你的 Sheet：Index 2 是成員 ID, Index 3 是項目)
  for (let i = 0; i < rows; i++) {
    let rawId = data.getValue(i, 2); 
    let rawEvent = data.getValue(i, 3);
    
    if (rawId) {
      let cleanId = rawId.toString().trim().toUpperCase();
      if (statusMap[cleanId]) {
        // 避免重複標籤
        if (!statusMap[cleanId].includes(rawEvent)) {
          statusMap[cleanId].push(rawEvent);
        }
      }
    }
  }

  renderGrid(statusMap);
}

function renderGrid(map) {
  const container = document.getElementById('dashboardGrid');
  container.innerHTML = "";

  for (let t = 1; t <= 26; t++) {
    let teamId = t.toString().padStart(2, '0');
    
    // 建立隊伍列 (Row)
    const row = document.createElement('div');
    row.className = 'team-row';
    
    let rowHtml = `<div class="team-label">T${teamId}</div>`;
    rowHtml += `<div class="members-container">`;

    // 建立隊員格 (A-I)
    "ABCDEFGHI".split("").forEach(letter => {
      let id = teamId + letter;
      let events = map[id] || [];
      let isDone = events.length > 0;
      
      let tagsHtml = events.map(e => `<span class="tag">${e}</span>`).join('');
      
      rowHtml += `
        <div class="member-box ${isDone ? 'is-done' : 'is-none'}">
          <div class="member-id">${id}</div>
          <div class="tag-list">${tagsHtml}</div>
        </div>
      `;
    });

    rowHtml += `</div>`;
    row.innerHTML = rowHtml;
    container.appendChild(row);
  }
}
</script>

</body>
</html>
