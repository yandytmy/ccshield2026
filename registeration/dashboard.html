<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <title>CCShield2026 詳細看板</title>
    <style>
        :root { --success: #43A047; --pending: #444; --bg: #1a1a1a; --primary: #1E88E5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; display: flex; height: 100vh; margin: 0; }
        
        /* 左側列表 */
        .sidebar { width: 350px; background: #252525; padding: 20px; border-right: 2px solid #333; overflow-y: auto; }
        /* 右側詳情 */
        .main-content { flex: 1; padding: 40px; overflow-y: auto; }

        .team-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .side-team-box { padding: 15px; border-radius: 8px; background: var(--pending); text-align: center; cursor: pointer; font-weight: bold; }
        .side-team-box.active { border: 2px solid var(--primary); transform: scale(1.05); }
        .side-team-box.done { background: var(--success); color: white; }

        .detail-card { background: #333; border-radius: 15px; padding: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .member-row { display: flex; align-items: center; justify-content: space-between; padding: 15px; border-bottom: 1px solid #444; }
        .status-badge { padding: 5px 15px; border-radius: 20px; font-size: 14px; font-weight: bold; }
        .status-ok { background: var(--success); }
        .status-wait { background: #888; }
        
        h2 { margin-top: 0; color: var(--primary); }
    </style>
</head>
<body>

    <div class="sidebar">
        <h3>隊伍總覽 (<span id="count">0</span>/26)</h3>
        <div id="teamGrid" class="team-grid"></div>
    </div>

    <div class="main-content">
        <div id="detailView" class="detail-card">
            <h2 id="detailTitle">請選擇隊伍</h2>
            <div id="memberList"></div>
        </div>
    </div>

    <script>
        const API_URL = "你的_報到回應_APPS_SCRIPT_URL"; 
        let globalData = null;
        let currentSelectedTeam = "01";

        async function fetchStats() {
            try {
                const res = await fetch(API_URL);
                globalData = await res.json();
                renderSidebar();
                renderDetail(currentSelectedTeam);
            } catch (e) { console.error(e); }
        }

        function renderSidebar() {
            const container = document.getElementById('teamGrid');
            container.innerHTML = "";
            for (let i = 1; i <= 26; i++) {
                const t = String(i).padStart(2, '0');
                const isDone = globalData.reportedTeams.includes(t);
                const div = document.createElement('div');
                div.className = `side-team-box ${isDone ? 'done' : ''} ${t === currentSelectedTeam ? 'active' : ''}`;
                div.innerText = t;
                div.onclick = () => { currentSelectedTeam = t; renderSidebar(); renderDetail(t); };
                container.appendChild(div);
            }
            document.getElementById('count').innerText = globalData.totalTeamsCount;
        }

        function renderDetail(teamId) {
            document.getElementById('detailTitle').innerText = `隊伍 ${teamId} 隊員報到詳情`;
            const list = document.getElementById('memberList');
            list.innerHTML = "";
            
            // 假設每隊固定 6 人
            for (let m = 1; m <= 9; m++) {
                const isMemberDone = globalData.checkedInList.includes(`${teamId}-${m}`);
                const row = document.createElement('div');
                row.className = "member-row";
                row.innerHTML = `
                    <span>隊員 ${m}</span>
                    <span class="status-badge ${isMemberDone ? 'status-ok' : 'status-wait'}">
                        ${isMemberDone ? '✅ 已完成' : '⏳ 待報到'}
                    </span>
                `;
                list.appendChild(row);
            }
        }

        fetchStats();
        setInterval(fetchStats, 30000);
    </script>
</body>
</html>
